<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sportingrank - Top Sports Rankings</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-blue-600">sportingrank</span>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="#" class="text-gray-700 hover:text-blue-600">Home</a>
                    <a href="#rankings" class="text-gray-700 hover:text-blue-600">Rankings</a>
                    <a href="#" class="text-gray-700 hover:text-blue-600">About</a>
                </div>
            </div>
        </div>
    </nav>
    <header class="bg-blue-600 text-white py-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4">Discover the World's Top Sports</h1>
            <p class="text-xl md:text-2xl mb-8">Comprehensive rankings and insights into your favorite games.</p>
            <a href="#rankings" class="bg-white text-blue-600 px-8 py-3 rounded-full font-bold text-lg hover:bg-gray-100 transition duration-300">View Rankings</a>
        </div>
    </header>
    <section id="rankings" class="py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="text-3xl font-bold text-center mb-12 text-gray-800">Top Sports Rankings</h2>
            <div class="overflow-x-auto shadow-lg rounded-lg">
                <table class="min-w-full bg-white">
                    <thead class="bg-gray-100 border-b border-gray-200">
                        <tr>
                            <th class="py-4 px-6 text-left text-sm font-semibold text-gray-600 uppercase tracking-wider">Rank</th>
                            <th class="py-4 px-6 text-left text-sm font-semibold text-gray-600 uppercase tracking-wider">Sport</th>
                            <th class="py-4 px-6 text-left text-sm font-semibold text-gray-600 uppercase tracking-wider">Global Popularity</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-4 px-6 text-sm font-bold text-gray-800">1</td>
                            <td class="py-4 px-6 text-sm text-gray-700">Football (Soccer)</td>
                            <td class="py-4 px-6 text-sm text-gray-700">3.5 Billion Fans</td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-4 px-6 text-sm font-bold text-gray-800">2</td>
                            <td class="py-4 px-6 text-sm text-gray-700">Cricket</td>
                            <td class="py-4 px-6 text-sm text-gray-700">2.5 Billion Fans</td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-4 px-6 text-sm font-bold text-gray-800">3</td>
                            <td class="py-4 px-6 text-sm text-gray-700">Basketball</td>
                            <td class="py-4 px-6 text-sm text-gray-700">2.2 Billion Fans</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</body>
</html>
